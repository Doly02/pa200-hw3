name: Build ASP.NET Framework app

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore packages
        run: nuget restore aspnet-get-started.sln

      - name: Build
        run: msbuild aspnet-get-started.sln /p:Configuration=Release /p:Platform="Any CPU"
